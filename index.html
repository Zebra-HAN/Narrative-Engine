<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narrative Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0c10; color: #ccc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0c0c10; }
  ::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 2px; }

  /* ── 오프닝 오버레이 ── */
  #opening {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #opening.fade-out {
    opacity: 0;
  }

  .logo-wrap {
    position: relative;
    text-align: center;
    opacity: 0;
    animation: logoAppear 0.6s ease 0.4s forwards;
  }

  @keyframes logoAppear {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .logo-text {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 400;
    letter-spacing: 0.35em;
    color: #c9a96e;
    position: relative;
    display: inline-block;
    /* 왼→오른쪽 마스크 reveal */
    clip-path: inset(0 100% 0 0);
    animation: revealText 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
  }

  @keyframes revealText {
    0%   { clip-path: inset(0 100% 0 0); }
    100% { clip-path: inset(0 0% 0 0); }
  }

  /* 광택 슬라이드 */
  .logo-text::after {
    content: '';
    position: absolute;
    top: 0; left: -60%;
    width: 45%;
    height: 100%;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(255, 240, 190, 0.55) 50%,
      transparent 70%
    );
    animation: sheen 1.4s ease 0.5s forwards;
    pointer-events: none;
  }

  @keyframes sheen {
    0%   { left: -60%; opacity: 0; }
    15%  { opacity: 1; }
    100% { left: 130%; opacity: 0; }
  }

  /* 후광 */
  .logo-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120%;
    height: 200%;
    background: radial-gradient(ellipse at center,
      rgba(201, 169, 110, 0.12) 0%,
      transparent 65%
    );
    opacity: 0;
    animation: glowIn 1s ease 0.8s forwards;
    pointer-events: none;
  }

  @keyframes glowIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* 하단 라인 */
  .logo-line {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a96e80, transparent);
    margin: 0.6rem auto 0;
    animation: lineExpand 0.8s ease 1.5s forwards;
  }

  @keyframes lineExpand {
    from { width: 0; opacity: 0; }
    to   { width: 80%; opacity: 1; }
  }

  /* ── 메인 앱 ── */
  #app-root {
    opacity: 0;
    transition: opacity 0.6s ease;
    height: 100vh;
    overflow: hidden;
  }
  #app-root.visible {
    opacity: 1;
    overflow: auto;
  }

  /* ── 모바일 레이아웃 ── */
  @media (max-width: 640px) {
    body { overflow: auto; }
    #app-root.visible { overflow: auto; height: auto; }

    .main-layout {
      flex-direction: column !important;
      height: auto !important;
      overflow: visible !important;
    }

    /* 카테고리 탭: 가로 스크롤 */
    .cat-sidebar {
      width: 100% !important;
      min-width: unset !important;
      border-right: none !important;
      border-bottom: 1px solid #1e1e2e !important;
      flex-direction: row !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
      flex-shrink: 0 !important;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cat-sidebar::-webkit-scrollbar { display: none; }

    .cat-tab {
      padding: 0.6rem 0.85rem !important;
      border-left: none !important;
      border-bottom: 2px solid transparent !important;
      white-space: nowrap !important;
      flex-shrink: 0 !important;
    }
    .cat-tab.active {
      border-bottom-color: #c9a96e !important;
      border-left-color: transparent !important;
    }
    .cat-tab-num { display: none !important; }
    .cat-tab-icon { display: none !important; }

    /* 오른쪽 장착 패널: 아래로 이동 */
    .equip-panel {
      width: 100% !important;
      min-width: unset !important;
      border-left: none !important;
      border-top: 1px solid #1e1e2e !important;
      padding: 0.8rem !important;
    }
    .equip-list {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 0.5rem !important;
    }
    .equip-item {
      margin-bottom: 0 !important;
      padding-bottom: 0 !important;
      border-bottom: none !important;
      background: #13131c;
      padding: 0.5rem !important;
      border-radius: 2px;
    }

    /* 카드 그리드 */
    .card-grid {
      grid-template-columns: repeat(2, 1fr) !important;
    }

    /* 헤더 */
    .header-title { font-size: 0.82rem !important; }
    .header-btn { padding: 0.35rem 0.6rem !important; font-size: 0.6rem !important; }
  }
</style>
</head>
<body>

<!-- 오프닝 -->
<div id="opening">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-text">NARRATIVE ENGINE</div>
    <div class="logo-line"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app-root">
  <div id="root"></div>
</div>

<script>
  // 오프닝 타이밍 제어
  // reveal: 0.5s delay + 1.4s 애니 = 1.9s
  // 유지: 1s
  // 페이드아웃 시작: 2.9s
  // 페이드아웃 duration: 0.8s → 총 3.7s 뒤 제거
  window.addEventListener('DOMContentLoaded', function() {
    var opening = document.getElementById('opening');
    var appRoot = document.getElementById('app-root');

    setTimeout(function() {
      opening.classList.add('fade-out');
    }, 2900);

    setTimeout(function() {
      opening.style.display = 'none';
      appRoot.classList.add('visible');
      document.body.style.overflow = '';
    }, 3700);
  });
</script>

<script type="text/babel">

const ACCENT = "#c9a96e";
const BG = "#0c0c10";
const CARD_BG = "#13131c";
const BORDER = "#1e1e2e";

const DATA = {
  character: {
    label: "캐릭터",
    icon: "◈",
    sub: "주인공 유형",
    items: [
      { id: "c1", name: "영웅형", sub: "앞으로 나아가는 자" },
      { id: "c2", name: "아웃사이더형", sub: "경계에 선 자" },
      { id: "c3", name: "속죄자형", sub: "과거를 짊어진 자" },
      { id: "c4", name: "각성자형", sub: "진실에 눈뜨는 자" },
      { id: "c5", name: "수호자형", sub: "타인을 위해 사는 자" },
      { id: "c6", name: "반항아형", sub: "세계에 맞서는 자" },
    ],
  },
  inner: {
    label: "내면",
    icon: "◇",
    sub: "상처 / 가면",
    items: [
      { id: "i1", name: "버려진 기억", sub: "유기의 상처" },
      { id: "i2", name: "지키지 못한 약속", sub: "죄책의 상처" },
      { id: "i3", name: "존재 부정", sub: "정체성의 상처" },
      { id: "i4", name: "배신당한 믿음", sub: "신뢰의 상처" },
      { id: "i5", name: "아무것도 못 했던 순간", sub: "무력감의 상처" },
      { id: "i6", name: "잘못된 선택", sub: "후회의 상처" },
    ],
  },
  desire: {
    label: "욕망",
    icon: "♦",
    sub: "Want / 표면 욕구",
    items: [
      { id: "d1", name: "강해지고 싶다", sub: "성장 동기" },
      { id: "d2", name: "인정받고 싶다", sub: "자존 동기" },
      { id: "d3", name: "지키고 싶다", sub: "보호 동기" },
      { id: "d4", name: "진실을 알고 싶다", sub: "탐구 동기" },
      { id: "d5", name: "용서받고 싶다", sub: "속죄 동기" },
      { id: "d6", name: "연결되고 싶다", sub: "유대 동기" },
    ],
  },
  need: {
    label: "Need",
    icon: "◉",
    sub: "진짜 필요 / 내면 과제",
    items: [
      { id: "n1", name: "자기 자신을 용서하기", sub: "내면 해방" },
      { id: "n2", name: "타인을 믿는 법 배우기", sub: "신뢰 회복" },
      { id: "n3", name: "놓아주는 것", sub: "집착 해소" },
      { id: "n4", name: "자기 존재 긍정하기", sub: "정체성 확립" },
      { id: "n5", name: "혼자서도 설 수 있기", sub: "자립 성장" },
      { id: "n6", name: "책임을 받아들이기", sub: "성숙" },
    ],
  },
  conflict: {
    label: "갈등구조",
    icon: "✕",
    sub: "핵심 역설",
    items: [
      { id: "cf1", name: "강해질수록 고독해진다", sub: "성장의 역설" },
      { id: "cf2", name: "지킬수록 상처 입힌다", sub: "보호의 역설" },
      { id: "cf3", name: "진실이 파멸을 부른다", sub: "인식의 역설" },
      { id: "cf4", name: "복수가 자신을 갉아먹는다", sub: "증오의 역설" },
      { id: "cf5", name: "사랑하기에 떠나야 한다", sub: "감정의 역설" },
      { id: "cf6", name: "믿음이 배신의 씨앗이 된다", sub: "신뢰의 역설" },
    ],
  },
  ending: {
    label: "결말",
    icon: "◎",
    sub: "결말 유형",
    items: [
      { id: "e1", name: "성장형 해피엔딩", sub: "극복하고 앞으로" },
      { id: "e2", name: "비극적 각성", sub: "잃고 나서 깨달음" },
      { id: "e3", name: "열린 결말", sub: "여운을 남김" },
      { id: "e4", name: "속죄 완성", sub: "죄를 갚고 평화" },
      { id: "e5", name: "희생형 엔딩", sub: "타인을 위한 선택" },
      { id: "e6", name: "순환형 엔딩", sub: "다시 시작되는 여정" },
    ],
  },
  genre: {
    label: "장르/톤",
    icon: "▣",
    sub: "분위기",
    items: [
      { id: "g1", name: "소년만화", sub: "성장·우정·배틀" },
      { id: "g2", name: "치유·일상", sub: "따뜻함·회복" },
      { id: "g3", name: "미스터리", sub: "긴장·반전" },
      { id: "g4", name: "다크판타지", sub: "절망·구원" },
      { id: "g5", name: "로맨스", sub: "감정·관계" },
      { id: "g6", name: "개그·코미디", sub: "웃음·템포" },
    ],
  },
  message: {
    label: "메시지",
    icon: "◐",
    sub: "작품이 말하려는 것",
    items: [
      { id: "m1", name: "약함도 힘이 된다", sub: "취약성의 가치" },
      { id: "m2", name: "혼자가 아니다", sub: "연결의 가치" },
      { id: "m3", name: "선택이 사람을 만든다", sub: "의지의 가치" },
      { id: "m4", name: "과거는 바꿀 수 없지만 의미는 바꿀 수 있다", sub: "해석의 자유" },
      { id: "m5", name: "진짜 강함은 포기하지 않는 것", sub: "인내의 가치" },
      { id: "m6", name: "용서는 상대가 아닌 자신을 위한 것", sub: "내면 해방" },
    ],
  },
};

const CATEGORY_ORDER = ["character","inner","desire","need","conflict","ending","genre","message"];

function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function App() {
  const [selected, setSelected] = React.useState({});
  const [activeCategory, setActiveCategory] = React.useState("character");
  const [showResult, setShowResult] = React.useState(false);

  function toggle(catId, itemId) {
    setSelected(prev => ({
      ...prev,
      [catId]: prev[catId] === itemId ? null : itemId,
    }));
    setShowResult(false);
  }

  function randomAll() {
    const result = {};
    CATEGORY_ORDER.forEach(key => {
      const items = DATA[key].items;
      result[key] = getRandom(items).id;
    });
    setSelected(result);
    setShowResult(true);
  }

  function reset() {
    setSelected({});
    setShowResult(false);
  }

  const totalSelected = CATEGORY_ORDER.filter(k => selected[k]).length;
  const allSelected = CATEGORY_ORDER.every(k => selected[k]);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>

      {/* 헤더 */}
      <div style={{
        borderBottom:`1px solid ${BORDER}`,
        padding:"0.9rem 1.2rem",
        display:"flex",
        alignItems:"center",
        justifyContent:"space-between",
        background:"#0e0e14",
        flexShrink:0,
      }}>
        <div>
          <div style={{ fontSize:"0.55rem", letterSpacing:"0.3em", color:"#333", marginBottom:"0.15rem" }}>NARRATIVE ENGINE</div>
          <div className="header-title" style={{ fontSize:"0.95rem", color:"#e8e0d5", letterSpacing:"0.05em" }}>창작 설계 보드</div>
        </div>
        <div style={{ display:"flex", gap:"0.6rem", alignItems:"center" }}>
          <div style={{ fontSize:"0.65rem", color: totalSelected > 0 ? ACCENT : "#333" }}>
            {totalSelected} / {CATEGORY_ORDER.length}
          </div>
          <button className="header-btn" onClick={randomAll} style={{
            padding:"0.4rem 0.8rem",
            background:"transparent",
            border:`1px solid #333`,
            color:"#666",
            fontSize:"0.65rem",
            cursor:"pointer",
            letterSpacing:"0.1em",
            borderRadius:"1px",
          }}>랜덤</button>
          <button className="header-btn" onClick={reset} style={{
            padding:"0.4rem 0.8rem",
            background:"transparent",
            border:`1px solid #222`,
            color:"#444",
            fontSize:"0.65rem",
            cursor:"pointer",
            letterSpacing:"0.1em",
            borderRadius:"1px",
          }}>초기화</button>
        </div>
      </div>

      <div className="main-layout" style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* 왼쪽 카테고리 탭 */}
        <div className="cat-sidebar" style={{
          width:"110px", minWidth:"110px",
          borderRight:`1px solid ${BORDER}`,
          background:"#0e0e14",
          overflowY:"auto",
          display:"flex",
          flexDirection:"column",
        }}>
          {CATEGORY_ORDER.map((key, i) => {
            const cat = DATA[key];
            const isActive = activeCategory === key;
            const isDone = !!selected[key];
            return (
              <div
                key={key}
                className={`cat-tab${isActive ? ' active' : ''}`}
                onClick={() => setActiveCategory(key)}
                style={{
                  padding:"0.85rem 0.8rem",
                  cursor:"pointer",
                  borderLeft: isActive ? `2px solid ${ACCENT}` : "2px solid transparent",
                  background: isActive ? CARD_BG : "transparent",
                  transition:"all 0.15s",
                }}
              >
                <div className="cat-tab-num" style={{ fontSize:"0.55rem", color: isDone ? ACCENT : "#2a2a35", marginBottom:"0.2rem" }}>
                  {isDone ? "✓" : `0${i+1}`}
                </div>
                <div style={{ fontSize:"0.65rem", color: isActive ? "#e8e0d5" : isDone ? ACCENT : "#444", lineHeight:1.4 }}>
                  {cat.label}
                </div>
                <div className="cat-tab-icon" style={{ fontSize:"0.55rem", color:"#2a2a35", marginTop:"0.15rem" }}>
                  {cat.icon}
                </div>
              </div>
            );
          })}
        </div>

        {/* 중앙 카드 그리드 */}
        <div style={{ flex:1, padding:"1.2rem", overflowY:"auto" }}>
          {CATEGORY_ORDER.map(key => {
            if (activeCategory !== key) return null;
            const cat = DATA[key];
            return (
              <div key={key}>
                <div style={{ marginBottom:"1rem" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"0.5rem", marginBottom:"0.2rem" }}>
                    <span style={{ color:ACCENT }}>{cat.icon}</span>
                    <span style={{ fontSize:"0.85rem", color:"#e8e0d5" }}>{cat.label}</span>
                  </div>
                  <div style={{ fontSize:"0.6rem", color:"#333", letterSpacing:"0.1em" }}>{cat.sub}</div>
                </div>
                <div className="card-grid" style={{
                  display:"grid",
                  gridTemplateColumns:"repeat(auto-fill, minmax(150px, 1fr))",
                  gap:"0.7rem",
                }}>
                  {cat.items.map(item => {
                    const isSel = selected[key] === item.id;
                    return (
                      <div key={item.id} onClick={() => toggle(key, item.id)} style={{
                        background: isSel ? `${ACCENT}18` : CARD_BG,
                        border:`1px solid ${isSel ? ACCENT : BORDER}`,
                        borderRadius:"2px",
                        padding:"0.9rem",
                        cursor:"pointer",
                        transition:"all 0.15s",
                        transform: isSel ? "translateY(-2px)" : "none",
                      }}>
                        <div style={{ fontSize:"0.82rem", color: isSel ? ACCENT : "#c8c0b8", marginBottom:"0.25rem" }}>
                          {item.name}
                        </div>
                        <div style={{ fontSize:"0.6rem", color:"#333" }}>{item.sub}</div>
                        {isSel && <div style={{ fontSize:"0.5rem", color:ACCENT, marginTop:"0.5rem", letterSpacing:"0.15em" }}>✓ 장착됨</div>}
                      </div>
                    );
                  })}
                </div>

                {/* 다음 단계 */}
                {CATEGORY_ORDER.indexOf(key) < CATEGORY_ORDER.length - 1 && (
                  <div onClick={() => setActiveCategory(CATEGORY_ORDER[CATEGORY_ORDER.indexOf(key)+1])} style={{
                    marginTop:"1.2rem",
                    padding:"0.5rem",
                    textAlign:"center",
                    fontSize:"0.6rem",
                    color:"#2a2a35",
                    cursor:"pointer",
                    letterSpacing:"0.2em",
                    borderTop:`1px solid ${BORDER}`,
                  }}>
                    다음 단계 →
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* 오른쪽 장착 패널 */}
        <div className="equip-panel" style={{
          width:"170px", minWidth:"170px",
          borderLeft:`1px solid ${BORDER}`,
          background:"#0e0e14",
          padding:"1rem 0.9rem",
          overflowY:"auto",
          display:"flex",
          flexDirection:"column",
        }}>
          <div style={{ fontSize:"0.55rem", color:"#2a2a35", letterSpacing:"0.25em", marginBottom:"0.8rem" }}>
            장착 목록
          </div>

          <div className="equip-list">
            {CATEGORY_ORDER.map(key => {
              const cat = DATA[key];
              const selId = selected[key];
              const selItem = selId ? cat.items.find(i => i.id === selId) : null;
              return (
                <div key={key} className="equip-item" style={{
                  marginBottom:"0.7rem",
                  paddingBottom:"0.7rem",
                  borderBottom:`1px solid ${BORDER}`,
                }}>
                  <div style={{ fontSize:"0.52rem", color:"#2a2a35", letterSpacing:"0.08em", marginBottom:"0.25rem" }}>
                    {cat.icon} {cat.label}
                  </div>
                  <div style={{ fontSize:"0.72rem", color: selItem ? "#e8e0d5" : "#1e1e2e" }}>
                    {selItem ? selItem.name : "—"}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ flex:1 }} />

          {/* 완성 버튼 */}
          <div onClick={() => allSelected && setShowResult(true)} style={{
            padding:"0.7rem",
            textAlign:"center",
            background: allSelected ? `${ACCENT}20` : "transparent",
            border:`1px solid ${allSelected ? ACCENT : "#1e1e2e"}`,
            borderRadius:"1px",
            fontSize:"0.65rem",
            color: allSelected ? ACCENT : "#1e1e2e",
            cursor: allSelected ? "pointer" : "default",
            letterSpacing:"0.15em",
            transition:"all 0.3s",
            marginTop:"0.5rem",
          }}>
            {allSelected ? "뼈대 완성 →" : "모두 선택하면\n완성"}
          </div>
        </div>
      </div>

      {/* 결과 오버레이 */}
      {showResult && (
        <div onClick={() => setShowResult(false)} style={{
          position:"fixed", inset:0,
          background:"rgba(0,0,0,0.88)",
          display:"flex", alignItems:"center", justifyContent:"center",
          padding:"1.5rem", zIndex:100,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:CARD_BG,
            border:`1px solid ${ACCENT}50`,
            borderRadius:"2px",
            padding:"1.8rem",
            maxWidth:"460px", width:"100%",
            maxHeight:"85vh", overflowY:"auto",
          }}>
            <div style={{ fontSize:"0.55rem", color:ACCENT, letterSpacing:"0.3em", marginBottom:"1.2rem" }}>
              ✓ 서사 뼈대 완성
            </div>

            {CATEGORY_ORDER.map(key => {
              const cat = DATA[key];
              const selItem = cat.items.find(i => i.id === selected[key]);
              if (!selItem) return null;
              return (
                <div key={key} style={{
                  display:"flex", gap:"0.8rem",
                  marginBottom:"0.9rem", paddingBottom:"0.9rem",
                  borderBottom:`1px solid ${BORDER}`,
                }}>
                  <div style={{ fontSize:"0.55rem", color:"#333", minWidth:"60px", paddingTop:"0.15rem" }}>
                    {cat.label}
                  </div>
                  <div>
                    <div style={{ fontSize:"0.85rem", color:"#e8e0d5" }}>{selItem.name}</div>
                    <div style={{ fontSize:"0.6rem", color:"#444", marginTop:"0.15rem" }}>{selItem.sub}</div>
                  </div>
                </div>
              );
            })}

            {/* 서사 씨앗 */}
            <div style={{
              background:"#0d0d0f",
              border:`1px solid ${BORDER}`,
              padding:"1rem", marginTop:"0.5rem", borderRadius:"1px",
            }}>
              <div style={{ fontSize:"0.52rem", color:"#2a2a35", letterSpacing:"0.2em", marginBottom:"0.5rem" }}>서사 씨앗</div>
              <div style={{ fontSize:"0.75rem", color:"#666", lineHeight:1.9 }}>
                「{selected.character && DATA.character.items.find(i=>i.id===selected.character)?.name}」은<br/>
                「{selected.desire && DATA.desire.items.find(i=>i.id===selected.desire)?.name}」을 원하지만,<br/>
                「{selected.conflict && DATA.conflict.items.find(i=>i.id===selected.conflict)?.name}」<br/>
                진짜 과제는 「{selected.need && DATA.need.items.find(i=>i.id===selected.need)?.name}」이다.
              </div>
            </div>

            <div onClick={() => setShowResult(false)} style={{
              marginTop:"1.2rem", textAlign:"center",
              fontSize:"0.6rem", color:"#333",
              cursor:"pointer", letterSpacing:"0.2em",
            }}>
              닫기
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
