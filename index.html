<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Narrative Builder — 창조주의 설계도</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════
       RESET & ROOT VARIABLES
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deepest:    #080a0f;
      --bg-dark:       #0d1017;
      --bg-panel:      #111520;
      --bg-panel2:     #161c2a;
      --bg-bar:        #0a0d14;

      --gold-dim:      #8a7340;
      --gold-mid:      #c9a84c;
      --gold-bright:   #e8c96a;
      --gold-glow:     #f5d98a;
      --bronze:        #a0693a;
      --ivory:         #f0e8d5;
      --ivory-dim:     #c8bfa8;
      --lavender:      #9b8ec4;
      --lavender-dim:  #6b5e8a;

      --text-primary:  #e8dfc8;
      --text-secondary:#a09070;
      --text-muted:    #5a5040;

      --border-gold:   rgba(180, 145, 60, 0.35);
      --border-gold2:  rgba(200, 165, 70, 0.6);
      --shadow-gold:   0 0 20px rgba(180,145,50,0.15);
      --shadow-deep:   0 8px 32px rgba(0,0,0,0.7);

      --radius-card:   10px;
      --radius-btn:    8px;
      --radius-panel:  12px;

      --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast:   0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-deepest);
      color: var(--text-primary);
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      user-select: none;
    }

    /* ═══════════════════════════════════════════════
       SCREEN MANAGEMENT
    ═══════════════════════════════════════════════ */
    .screen {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ═══════════════════════════════════════════════
       PAGE TURN ANIMATION
    ═══════════════════════════════════════════════ */
    .page-turn-overlay {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      perspective: 1200px;
    }
    .page-turn-flap {
      position: absolute; inset: 0;
      background: #f5f0e8;
      transform-origin: left center;
      transform: rotateY(0deg);
      backface-visibility: hidden;
      display: none;
      box-shadow: -10px 0 40px rgba(0,0,0,0.5);
    }
    .page-turn-flap.turning {
      display: block;
      animation: pageTurn 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes pageTurn {
      0%   { transform: rotateY(0deg); clip-path: polygon(100% 0%, 100% 100%, 0% 100%, 0% 0%); }
      100% { transform: rotateY(-180deg); clip-path: polygon(100% 0%, 100% 100%, 0% 100%, 0% 0%); }
    }

    /* 책장 넘기기 — 오른쪽 하단에서 왼쪽으로 */
    .page-curtain {
      position: fixed; inset: 0; z-index: 9998;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }
    .page-curtain.active { display: block; }
    .page-curtain-inner {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #f5efe0 0%, #e8dfc8 40%, #d5c9b0 100%);
      transform-origin: right bottom;
      transform: translate(100%, 100%);
    }
    .page-curtain-inner.animate {
      animation: curtainFlip 0.75s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    }
    @keyframes curtainFlip {
      0%   { transform: translate(100%, 100%) scale(0.1); opacity: 0.9; }
      40%  { transform: translate(0%, 0%) scale(1.05); opacity: 1; }
      100% { transform: translate(-100%, 0%) scale(1); opacity: 0; }
    }


    /* ═══════════════════════════════════════════════
       OPENING SCREEN
    ═══════════════════════════════════════════════ */
    #screen-opening {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .opening-content {
      text-align: center;
      opacity: 0;
      transform: scale(0.88);
    }
    .opening-content.animate {
      animation: openingZoom 2.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes openingZoom {
      0%   { opacity: 0; transform: scale(0.88); }
      30%  { opacity: 1; transform: scale(0.94); }
      70%  { opacity: 1; transform: scale(0.99); }
      100% { opacity: 1; transform: scale(1); }
    }

    .opening-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 8vw, 3.8rem);
      font-weight: 700;
      color: var(--ivory);
      letter-spacing: 0.12em;
      text-shadow: 0 0 40px rgba(220,185,100,0.3);
    }
    .opening-divider-wrap {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0;
      overflow: hidden;
    }
    .opening-divider {
      height: 1.5px;
      width: 0;
      background: linear-gradient(90deg, transparent, var(--gold-bright) 20%, var(--gold-glow) 50%, var(--gold-bright) 80%, transparent);
      box-shadow: 0 0 8px var(--gold-bright), 0 0 20px rgba(230,200,100,0.4);
      transition: width 1.0s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .opening-divider.expand {
      width: 220px;
    }
    /* 중앙 빛 번쩍임 */
    .opening-divider::before {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold-glow);
      box-shadow: 0 0 12px 4px var(--gold-bright);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .opening-divider.flash::before { opacity: 1; }

    .opening-subtitle {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(0.85rem, 3vw, 1.15rem);
      font-weight: 300;
      color: var(--gold-mid);
      letter-spacing: 0.35em;
      text-transform: none;
    }


    /* ═══════════════════════════════════════════════
       HOME SCREEN
    ═══════════════════════════════════════════════ */
    #screen-home {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 90;
    }
    .home-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }
    .home-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .home-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }
    .home-btn-inner {
      width: 100%;
      height: 175px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 16px 20px;
    }
    .home-btn-label {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.25rem;
      font-weight: 600;
      z-index: 2;
      position: relative;
    }
    .home-btn-sublabel {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      z-index: 2;
      position: relative;
      margin-top: 2px;
      opacity: 0.8;
    }

    /* 서사 구조 버튼 — 하얀/밝은 테마 */
    #btn-narrative {
      background: linear-gradient(135deg, #f8f4ed 0%, #ede5d5 50%, #e0d5bf 100%);
    }
    #btn-narrative .home-btn-label { color: #3a2e1a; }
    #btn-narrative .home-btn-sublabel { color: #7a6540; }

    /* 창작 시작 버튼 — 어두운 우주 테마 */
    #btn-create {
      background: linear-gradient(135deg, #05080f 0%, #0a1020 50%, #0e1530 100%);
    }
    #btn-create .home-btn-label { color: var(--ivory); }
    #btn-create .home-btn-sublabel { color: var(--gold-mid); }

    /* 서사 구조 SVG 일러스트 */
    .narrative-illustration {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* 창작 시작 SVG 일러스트 */
    .create-illustration {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }


    /* ═══════════════════════════════════════════════
       NARRATIVE STRUCTURE PAGE
    ═══════════════════════════════════════════════ */
    #screen-narrative {
      background: var(--bg-deepest);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 80;
      padding: 24px;
      gap: 24px;
    }
    .narrative-header {
      text-align: center;
    }
    .narrative-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--gold-mid);
      letter-spacing: 0.2em;
    }
    .narrative-divider {
      width: 80px; height: 1px;
      background: var(--gold-dim);
      margin: 10px auto;
    }

    .narrative-main-row {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 420px;
    }
    .narrative-main-btn {
      flex: 1;
      aspect-ratio: 0.85;
      border: 1px solid var(--border-gold2);
      border-radius: var(--radius-panel);
      background: linear-gradient(160deg, var(--bg-panel2) 0%, var(--bg-panel) 100%);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 10px;
      box-shadow: var(--shadow-gold), var(--shadow-deep);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .narrative-main-btn:active { transform: scale(0.96); }
    .narrative-main-btn-icon { font-size: 2.2rem; }
    .narrative-main-btn-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.85rem;
      color: var(--gold-bright);
      text-align: center;
      line-height: 1.5;
    }
    .narrative-main-btn-sub {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .narrative-sub-btn {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-btn);
      background: linear-gradient(90deg, var(--bg-panel) 0%, var(--bg-panel2) 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      box-shadow: var(--shadow-deep);
      transition: transform 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .narrative-sub-btn:active { transform: scale(0.97); }
    .narrative-sub-btn-icon { font-size: 1.4rem; }
    .narrative-sub-btn-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.82rem;
      color: var(--ivory-dim);
    }

    .narrative-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.8rem;
      padding: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .narrative-back-btn:active { color: var(--gold-mid); }


    /* ═══════════════════════════════════════════════
       MAIN CREATIVE PAGE
    ═══════════════════════════════════════════════ */
    #screen-create {
      background: var(--bg-deepest);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      z-index: 70;
    }

    /* ── TOP PANEL ── */
    .top-panel {
      background: var(--bg-bar);
      border-bottom: 1px solid var(--border-gold);
      padding: 6px 10px 5px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .top-row1 {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .profile-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--gold-dim);
      background: linear-gradient(135deg, var(--bg-panel2), var(--bg-deepest));
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .minimap-panel {
      flex: 1;
      height: 34px;
      border: 1px solid var(--border-gold);
      border-radius: 6px;
      background: var(--bg-panel);
      overflow: hidden;
      position: relative;
    }
    .minimap-svg {
      width: 100%; height: 100%;
    }

    .top-row2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary);
      font-size: 1rem; padding: 3px 5px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .top-icon-btn:active { color: var(--gold-mid); background: rgba(180,145,60,0.1); }
    .top-icon-btn.back-btn { font-size: 1.1rem; }

    .reset-btns {
      display: flex; gap: 5px; align-items: center;
    }
    .reset-btn {
      background: rgba(100,80,40,0.15);
      border: 1px solid var(--border-gold);
      border-radius: 4px;
      color: var(--text-secondary);
      font-size: 0.6rem;
      padding: 3px 7px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .reset-btn:active { background: rgba(180,145,60,0.2); color: var(--gold-bright); }
    #btn-partial-reset { min-width: 68px; }

    /* ── SUBNAVIGATION (bar-style, horizontal scroll) ── */
    .subnav-panel {
      flex-shrink: 0;
      background: linear-gradient(180deg, #0e1220 0%, #0a0d16 100%);
      border-bottom: 1px solid var(--border-gold);
      padding: 0 10px;
      overflow: hidden;
      position: relative;
      height: 80px;
    }
    /* 바 테이블 느낌 배경 */
    .subnav-panel::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-dim) 30%, var(--gold-mid) 50%, var(--gold-dim) 70%, transparent);
    }
    /* 진열장 블러 배경 */
    .subnav-bg {
      position: absolute; inset: 0;
      display: flex; align-items: flex-start;
      padding-top: 4px;
      gap: 4px;
      opacity: 0.18;
      pointer-events: none;
    }
    .subnav-bottle {
      flex-shrink: 0;
      width: 22px; height: 55px;
      background: linear-gradient(180deg, #4a3a20 0%, #2a1a08 100%);
      border-radius: 3px 3px 0 0;
      filter: blur(1.5px);
    }

    .subnav-scroll {
      display: flex;
      align-items: center;
      height: 100%;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 0 4px;
      position: relative;
    }
    .subnav-scroll::-webkit-scrollbar { display: none; }

    .subnav-item {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      padding: 8px 4px 6px;
    }
    /* 마름모 (다이아몬드) 버튼 */
    .diamond-btn {
      width: 38px; height: 38px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      transform: rotate(45deg);
      border: 1.5px solid var(--border-gold);
      border-radius: 4px;
      background: linear-gradient(135deg, var(--bg-panel2), var(--bg-panel));
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .diamond-btn-icon {
      transform: rotate(-45deg);
      font-size: 1.1rem;
      line-height: 1;
    }
    /* 그림자 (바 테이블) */
    .diamond-shadow {
      width: 30px; height: 5px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
      margin-top: 2px;
    }
    .subnav-label {
      font-size: 0.6rem;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .subnav-item.active .diamond-btn {
      background: linear-gradient(135deg, #1e1a08, #2a2210);
      border-color: var(--gold-bright);
      box-shadow: 0 0 12px rgba(200,170,70,0.4), 0 2px 8px rgba(0,0,0,0.5);
    }
    .subnav-item.active .subnav-label { color: var(--gold-bright); }
    .subnav-item:active .diamond-btn { background: rgba(180,145,60,0.2); }

    /* ── CENTER AREA ── */
    .center-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .center-page {
      position: absolute; inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    .center-page::-webkit-scrollbar { width: 3px; }
    .center-page::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
    .center-page.active {
      opacity: 1; transform: translateY(0);
      pointer-events: all;
    }

    /* 섹션 헤더 */
    .section-label {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.7rem;
      color: var(--gold-dim);
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      padding-left: 4px;
      border-left: 2px solid var(--gold-dim);
      padding-left: 8px;
    }

    /* 카드 그리드 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px 5px;
      margin-bottom: 16px;
    }
    @media (min-width: 500px) {
      .card-grid { grid-template-columns: repeat(5, 1fr); }
    }
    @media (min-width: 700px) {
      .card-grid { grid-template-columns: repeat(6, 1fr); }
    }

    .data-card {
      aspect-ratio: 0.72;
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-card);
      background: linear-gradient(170deg, var(--bg-panel2) 0%, var(--bg-panel) 60%, #0d1018 100%);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 6px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(180,145,60,0.08);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .data-card:active {
      transform: scale(0.94);
      border-color: var(--gold-mid);
      box-shadow: 0 0 16px rgba(180,145,60,0.25);
    }
    .data-card.selected {
      border-color: var(--gold-bright);
      box-shadow: 0 0 14px rgba(200,170,70,0.35), 0 2px 8px rgba(0,0,0,0.5);
    }
    .data-card.selected::after {
      content: '✓';
      position: absolute; top: 4px; right: 5px;
      font-size: 0.65rem;
      color: var(--gold-bright);
    }
    .card-icon-area {
      flex: 1;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      padding-top: 8px;
    }
    .card-name {
      font-size: 0.6rem;
      color: var(--ivory-dim);
      text-align: center;
      padding: 0 3px;
      line-height: 1.3;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* 팝업 */
    .popup-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .popup-overlay.active { opacity: 1; pointer-events: all; }
    .popup-sheet {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: linear-gradient(180deg, var(--bg-panel2), var(--bg-panel));
      border: 1px solid var(--border-gold2);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      padding: 20px 18px 30px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.6), 0 -2px 0 var(--gold-dim);
    }
    .popup-overlay.active .popup-sheet { transform: translateY(0); }
    .popup-handle {
      width: 36px; height: 3px;
      background: var(--gold-dim);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .popup-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.05rem;
      color: var(--gold-bright);
      margin-bottom: 8px;
    }
    .popup-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .popup-select-btn {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius-btn);
      background: linear-gradient(90deg, rgba(120,100,40,0.2), rgba(80,65,25,0.15));
      color: var(--gold-bright);
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.2s, border-color 0.2s;
    }
    .popup-select-btn:active { background: rgba(180,145,60,0.3); }
    .popup-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.2rem;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      flex-shrink: 0;
      background: var(--bg-bar);
      border-top: 1px solid var(--border-gold);
      display: flex;
      height: 62px;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      border-right: 1px solid rgba(120,90,30,0.15);
      padding: 0 2px;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .nav-btn:last-child { border-right: none; }
    .nav-btn:active { background: rgba(180,145,60,0.08); }
    .nav-btn.active { background: rgba(180,145,60,0.06); }
    .nav-btn.active::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
    }
    .nav-icon {
      font-size: 1.3rem;
      line-height: 1;
    }
    .nav-label {
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .nav-btn.active .nav-label { color: var(--gold-bright); }


    /* ═══════════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════════ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      opacity: 0.4;
    }
    .empty-icon { font-size: 2.5rem; }
    .empty-text {
      font-size: 0.82rem;
      color: var(--text-secondary);
      text-align: center;
    }

    /* 커튼 내려오는 전환 효과 */
    .curtain-drop {
      position: absolute; top: 0; left: 0; right: 0;
      height: 100%;
      background: linear-gradient(180deg, var(--bg-panel2) 0%, transparent 100%);
      transform: translateY(-100%);
      pointer-events: none;
      z-index: 10;
    }
    .curtain-drop.animate {
      animation: curtainDown 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes curtainDown {
      0%   { transform: translateY(-100%); opacity: 1; }
      60%  { transform: translateY(0%); opacity: 0.8; }
      100% { transform: translateY(100%); opacity: 0; }
    }

    /* 서브메뉴 페이드인 */
    @keyframes subnavReveal {
      0%   { opacity: 0; transform: scale(0.85) rotate(45deg); }
      100% { opacity: 1; transform: scale(1) rotate(45deg); }
    }
    .subnav-item .diamond-btn {
      animation: none;
    }
    .subnav-item.reveal .diamond-btn {
      animation: subnavReveal 0.35s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* 선택된 카운터 배지 */
    .selection-badge {
      position: absolute; top: -4px; right: -4px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold-bright);
      color: #1a1200;
      font-size: 0.55rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 6px rgba(200,170,70,0.5);
    }

    @media (min-width: 600px) {
      .home-btn-inner { height: 200px; }
      .subnav-panel { height: 90px; }
      .diamond-btn { width: 44px; height: 44px; }

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let currentNav   = 'character';
let currentSubId = null;
let selectedCards = {};   // { subId: Set<idx> }

/* ════════════════════════════════════════════════
   OPENING ANIMATION
════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  const content  = document.getElementById('opening-content');
  const divider  = document.getElementById('opening-divider');

  // 줌업 시작
  setTimeout(() => {
    content.classList.add('animate');
  }, 300);

  // 선 등장 (줌업 시작 후 1초)
  setTimeout(() => {
    divider.classList.add('flash');
    setTimeout(() => {
      divider.classList.add('expand');
      setTimeout(() => divider.classList.remove('flash'), 600);
    }, 80);
  }, 1400);

  // 홈화면으로 페이지 넘기기
  setTimeout(() => {
    pageTurnTo('screen-home');
  }, 3800);
});

/* ════════════════════════════════════════════════
   SCREEN TRANSITION (페이지 넘기기)
════════════════════════════════════════════════ */
function pageTurnTo(targetId, callback) {
  const curtain = document.getElementById('page-curtain');
  const inner   = document.getElementById('page-curtain-inner');

  curtain.classList.add('active');
  inner.classList.add('animate');

  setTimeout(() => {
    // 모든 스크린 비활성화
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    // 타겟 활성화
    document.getElementById(targetId).classList.add('active');
    if (callback) callback();
  }, 380);

  setTimeout(() => {
    inner.classList.remove('animate');
    curtain.classList.remove('active');
  }, 780);
}

/* ════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════ */
function goHome() {
  pageTurnTo('screen-home');
}
function goToNarrative() {
  setTimeout(() => pageTurnTo('screen-narrative'), 180);
}
function goToCreate() {
  setTimeout(() => {
    pageTurnTo('screen-create', () => {
      switchNav('character', true);
    });
  }, 180);
}

/* ════════════════════════════════════════════════
   MAIN NAV SWITCH
════════════════════════════════════════════════ */
function switchNav(navId, skipAnimation) {
  if (navId === currentNav && !skipAnimation) return;

  const prev = currentNav;
  currentNav = navId;
  currentSubId = null;

  // 버튼 상태
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navMap = { character:'nav-character', narrative2:'nav-narrative2', world:'nav-world', compass:'nav-compass' };
  const nb = document.getElementById(navMap[navId]);
  if (nb) nb.classList.add('active');

  // 부분 초기화 버튼 텍스트
  document.getElementById('btn-partial-reset').textContent = NAV_DATA[navId].resetLabel;

  // 서브 메뉴 렌더
  renderSubnav(navId, !skipAnimation && prev !== navId);

  // 중앙 기본 상태로
  showDefaultCenter(!skipAnimation && prev !== navId);
}

function renderSubnav(navId, animate) {
  const scroll = document.getElementById('subnav-scroll');
  scroll.innerHTML = '';

  const subs = NAV_DATA[navId].subs;
  subs.forEach((sub, i) => {
    const item = document.createElement('div');
    item.className = 'subnav-item' + (animate ? ' reveal' : '');
    item.style.animationDelay = animate ? (i * 0.05) + 's' : '0s';
    item.setAttribute('data-sub-id', sub.id);
    item.onclick = () => selectSub(sub.id, navId);

    const count = selectedCards[sub.id] ? selectedCards[sub.id].size : 0;

    item.innerHTML = `
      <div class="diamond-btn" style="animation-delay:${animate ? i*0.05 : 0}s">
        <span class="diamond-btn-icon">${sub.icon}</span>
        ${count > 0 ? `<div class="selection-badge">${count}</div>` : ''}
      </div>
      <div class="diamond-shadow"></div>
      <div class="subnav-label">${sub.label}</div>
    `;
    scroll.appendChild(item);
  });
}

/* ════════════════════════════════════════════════
   SUB MENU SELECT
════════════════════════════════════════════════ */
function selectSub(subId, navId) {
  // 이전 active 제거
  document.querySelectorAll('.subnav-item').forEach(el => el.classList.remove('active'));
  // 현재 active
  const el = document.querySelector(`[data-sub-id="${subId}"]`);
  if (el) el.classList.add('active');

  const same = currentSubId === subId;
  currentSubId = subId;

  showCardPage(subId, !same);
}

/* ════════════════════════════════════════════════
   CENTER DISPLAY
════════════════════════════════════════════════ */
function showDefaultCenter(animate) {
  const area = document.getElementById('center-area');

  // 기존 동적 페이지 제거
  area.querySelectorAll('.center-page:not(#page-default)').forEach(p => p.remove());

  const def = document.getElementById('page-default');
  def.classList.add('active');

  if (animate) {
    triggerCurtain();
  }
}

function showCardPage(subId, animate) {
  const area = document.getElementById('center-area');

  // default 숨기기
  document.getElementById('page-default').classList.remove('active');

  // 기존 페이지 제거 (애니메이션 없이 즉시)
  area.querySelectorAll('.center-page:not(#page-default)').forEach(p => p.remove());

  if (animate) triggerCurtain();

  const page = document.createElement('div');
  page.className = 'center-page active';
  page.id = 'page-' + subId;

  const cards = CARD_DATA[subId] || [];
  const navInfo = Object.values(NAV_DATA).find(n => n.subs.find(s => s.id === subId));
  const subInfo = navInfo ? navInfo.subs.find(s => s.id === subId) : null;
  const label = subInfo ? subInfo.label : subId;

  let html = `<div class="section-label">${label}</div><div class="card-grid">`;

  if (!selectedCards[subId]) selectedCards[subId] = new Set();

  cards.forEach((card, idx) => {
    const sel = selectedCards[subId].has(idx) ? ' selected' : '';
    html += `
      <div class="data-card${sel}" onclick="cardClick('${subId}', ${idx}, '${escHtml(card.name)}', '${escHtml(card.icon)}')">
        <div class="card-icon-area">${card.icon}</div>
        <div class="card-name">${card.name}</div>
      </div>
    `;
  });

  html += '</div>';
  page.innerHTML = html;
  area.appendChild(page);

  // 약간의 딜레이 후 active 적용 (CSS transition 발동)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      page.classList.add('active');
    });
  });
}

function triggerCurtain() {
  const curtain = document.getElementById('curtain-drop');
  curtain.classList.remove('animate');
  void curtain.offsetWidth;
  curtain.classList.add('animate');
  setTimeout(() => curtain.classList.remove('animate'), 500);
}

/* ════════════════════════════════════════════════
   CARD INTERACTION
════════════════════════════════════════════════ */
function cardClick(subId, idx, name, icon) {
  // 팝업 표시
  document.getElementById('popup-title').textContent = icon + ' ' + name;
  document.getElementById('popup-desc').textContent = `[${name}] 항목의 상세 설명이 여기에 표시됩니다. 추후 각 항목별 설명과 서사적 활용 예시가 추가될 예정입니다.`;

  const overlay = document.getElementById('popup-overlay');
  overlay.classList.add('active');
  overlay.setAttribute('data-sub', subId);
  overlay.setAttribute('data-idx', idx);

  const btn = document.getElementById('popup-select-btn');
  const isSelected = selectedCards[subId] && selectedCards[subId].has(idx);
  btn.textContent = isSelected ? '✓ 선택 해제' : '이 항목 선택';
  btn.onclick = () => toggleCardSelect(subId, idx);
}

function toggleCardSelect(subId, idx) {
  if (!selectedCards[subId]) selectedCards[subId] = new Set();
  if (selectedCards[subId].has(idx)) {
    selectedCards[subId].delete(idx);
  } else {
    selectedCards[subId].add(idx);
  }

  // 카드 UI 업데이트
  const page = document.getElementById('page-' + subId);
  if (page) {
    const cards = page.querySelectorAll('.data-card');
    cards.forEach((card, i) => {
      if (i === idx) {
        card.classList.toggle('selected', selectedCards[subId].has(idx));
      }
    });
  }

  // 서브메뉴 배지 업데이트
  renderSubnav(currentNav, false);
  if (currentSubId) {
    const el = document.querySelector(`[data-sub-id="${currentSubId}"]`);
    if (el) el.classList.add('active');
  }

  // 팝업 버튼 텍스트
  const isSelected = selectedCards[subId].has(idx);
  document.getElementById('popup-select-btn').textContent = isSelected ? '✓ 선택 해제' : '이 항목 선택';
}

function closePopup(e) {
  if (e && e.target !== document.getElementById('popup-overlay')) return;
  document.getElementById('popup-overlay').classList.remove('active');
}

/* ════════════════════════════════════════════════
   RESET
════════════════════════════════════════════════ */
function partialReset() {
  const subs = NAV_DATA[currentNav].subs;
  subs.forEach(sub => { delete selectedCards[sub.id]; });
  if (currentSubId) showCardPage(currentSubId, false);
  renderSubnav(currentNav, false);
  if (currentSubId) {
    const el = document.querySelector(`[data-sub-id="${currentSubId}"]`);
    if (el) el.classList.add('active');
  }
}

function fullReset() {
  if (!confirm('모든 선택을 초기화할까요?')) return;
  selectedCards = {};
  if (currentSubId) showCardPage(currentSubId, false);
  renderSubnav(currentNav, false);
  if (currentSubId) {
    const el = document.querySelector(`[data-sub-id="${currentSubId}"]`);
    if (el) el.classList.add('active');
  }
}

/* ════════════════════════════════════════════════
   UTIL
════════════════════════════════════════════════ */
function escHtml(s) {
  return s.replace(/'/g, "\\'");
}
