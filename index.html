<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narrative Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- 스타일 -->
  <link rel="stylesheet" href="css/style.css">

  <!-- React / Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>

  <!-- 오프닝 -->
  <div id="opening">
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <div class="logo-text">NARRATIVE ENGINE</div>
      <div class="logo-sub">창작 설계 엔진</div>
      <div class="logo-line"></div>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app-root">
    <div id="root"></div>
  </div>

  <!-- 오프닝 타이밍 -->
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var opening = document.getElementById('opening');
      var appRoot = document.getElementById('app-root');
      setTimeout(function () { opening.classList.add('fade-out'); }, 3000);
      setTimeout(function () {
        opening.style.display = 'none';
        appRoot.classList.add('visible');
      }, 3900);
    });
  </script>

  <!-- 데이터 (순서 중요) -->
  <script src="data/character.js"></script>
  <script src="data/narrative.js"></script>
  <script src="data/world.js"></script>
  <script src="data/compass.js"></script>

  <!-- 앱 로직 -->
  <script type="text/babel" src="js/app.js"></script>

</body>
</html>
