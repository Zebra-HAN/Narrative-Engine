<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narrative Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg:        #080808;
  --bg2:       #0f0f0f;
  --bg3:       #141414;
  --bg4:       #1a1a1a;
  --border:    #252525;
  --border2:   #2e2e2e;
  --gold:      #c9a96e;
  --gold2:     #e8d5a3;
  --gold-dim:  #7a6340;
  --text:      #f0ece4;
  --text2:     #a89f90;
  --text3:     #6b6358;
  --white:     #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  overflow: hidden;
  height: 100vh;
}

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ══════════════════════════════════════════
   오프닝
══════════════════════════════════════════ */
#opening {
  position: fixed; inset: 0;
  background: #000;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.9s ease;
}
#opening.fade-out { opacity: 0; pointer-events: none; }

.logo-wrap { position: relative; text-align: center; opacity: 0; animation: logoIn 0.4s ease 0.3s forwards; }
@keyframes logoIn { to { opacity: 1; } }

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  letter-spacing: 0.55em;
  color: var(--gold);
  clip-path: inset(0 100% 0 0);
  animation: revealL 1.5s cubic-bezier(0.25, 0, 0.15, 1) 0.4s forwards;
  position: relative;
}
.logo-text::after {
  content: '';
  position: absolute; top: 0; left: -50%; width: 40%; height: 100%;
  background: linear-gradient(105deg, transparent 20%, rgba(255,240,190,0.6) 50%, transparent 80%);
  animation: sheen 1.5s ease 0.4s forwards;
  pointer-events: none;
}
@keyframes revealL { to { clip-path: inset(0 0% 0 0); } }
@keyframes sheen   { 0%{left:-50%;opacity:0} 10%{opacity:1} 100%{left:130%;opacity:0} }

.logo-sub {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  font-size: 0.6rem;
  letter-spacing: 0.45em;
  color: var(--text3);
  margin-top: 0.7rem;
  opacity: 0;
  animation: fadeInSub 0.6s ease 1.6s forwards;
}
@keyframes fadeInSub { to { opacity: 1; } }

.logo-line {
  width: 0; height: 1px; margin: 0.5rem auto 0;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  animation: lineEx 0.7s ease 1.8s forwards;
}
@keyframes lineEx { to { width: 70%; } }

.logo-glow {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 140%; height: 300%;
  background: radial-gradient(ellipse, rgba(201,169,110,0.1) 0%, transparent 60%);
  opacity: 0;
  animation: glowIn 1s ease 0.8s forwards;
  pointer-events: none;
}
@keyframes glowIn { to { opacity: 1; } }

/* ══════════════════════════════════════════
   앱 루트
══════════════════════════════════════════ */
#app-root {
  opacity: 0;
  transition: opacity 0.6s ease;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
#app-root.visible { opacity: 1; }

/* ══════════════════════════════════════════
   공통 버튼 스타일
══════════════════════════════════════════ */
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text3);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  padding: 0.35rem 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ghost:hover {
  border-color: var(--gold-dim);
  color: var(--gold);
}

.tag {
  display: inline-block;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  color: var(--gold);
  background: rgba(201,169,110,0.08);
  border: 1px solid rgba(201,169,110,0.2);
  padding: 0.15rem 0.45rem;
  border-radius: 1px;
  white-space: nowrap;
}

/* ══════════════════════════════════════════
   홈 화면
══════════════════════════════════════════ */
.home-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 2rem;
  position: relative;
}

.home-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem;
  letter-spacing: 0.5em;
  color: var(--gold-dim);
  margin-bottom: 2.5rem;
  text-align: center;
}

.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  max-width: 680px;
  width: 100%;
}

.home-btn {
  background: var(--bg2);
  border: none;
  padding: 2.4rem 2rem;
  cursor: pointer;
  text-align: left;
  transition: background 0.2s;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  position: relative;
  overflow: hidden;
}
.home-btn::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 2px; height: 0;
  background: var(--gold);
  transition: height 0.3s ease;
}
.home-btn:hover { background: var(--bg3); }
.home-btn:hover::before { height: 100%; }

.home-btn-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.75rem;
  color: var(--gold-dim);
  letter-spacing: 0.2em;
}
.home-btn-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0.05em;
  line-height: 1.2;
}
.home-btn-sub {
  font-size: 0.6rem;
  color: var(--text3);
  letter-spacing: 0.12em;
  margin-top: 0.3rem;
}
.home-btn-arrow {
  font-size: 0.8rem;
  color: var(--gold-dim);
  margin-top: 1rem;
  transition: transform 0.2s, color 0.2s;
}
.home-btn:hover .home-btn-arrow {
  transform: translateX(4px);
  color: var(--gold);
}

/* ══════════════════════════════════════════
   메인 레이아웃 (섹션 내부)
══════════════════════════════════════════ */
.engine-layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* 좌측 사이드바 */
.sidebar {
  width: 200px;
  min-width: 200px;
  border-right: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}

.sidebar-section-title {
  font-size: 0.5rem;
  letter-spacing: 0.35em;
  color: var(--text3);
  padding: 1rem 1rem 0.5rem;
  border-bottom: 1px solid var(--border);
}

.sidebar-item {
  padding: 0.7rem 1rem;
  font-size: 0.68rem;
  color: var(--text3);
  cursor: pointer;
  letter-spacing: 0.06em;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-item:hover { color: var(--text2); background: var(--bg3); }
.sidebar-item.active {
  color: var(--gold);
  border-left-color: var(--gold);
  background: var(--bg3);
}
.sidebar-item-count {
  font-size: 0.5rem;
  color: var(--gold-dim);
  background: rgba(201,169,110,0.1);
  padding: 0.1rem 0.35rem;
  border-radius: 1px;
}

/* 중앙 편집 영역 */
.main-panel {
  flex: 1;
  overflow-y: auto;
  padding: 1.8rem;
  background: var(--bg);
}

.panel-header {
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.panel-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0.05em;
}
.panel-subtitle {
  font-size: 0.58rem;
  color: var(--text3);
  letter-spacing: 0.2em;
  margin-top: 0.3rem;
}

/* 옵션 그리드 */
.option-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.6rem;
}

.option-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 0.85rem 1rem;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 1px;
  position: relative;
}
.option-card:hover {
  border-color: var(--border2);
  background: var(--bg3);
}
.option-card.selected {
  border-color: var(--gold);
  background: rgba(201,169,110,0.06);
}
.option-card-name {
  font-size: 0.78rem;
  color: var(--text2);
  margin-bottom: 0.2rem;
  transition: color 0.15s;
}
.option-card.selected .option-card-name { color: var(--gold); }
.option-card-sub {
  font-size: 0.55rem;
  color: var(--text3);
  letter-spacing: 0.05em;
}
.option-card-check {
  position: absolute; top: 0.5rem; right: 0.6rem;
  font-size: 0.5rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  opacity: 0;
  transition: opacity 0.15s;
}
.option-card.selected .option-card-check { opacity: 1; }

/* 검색/필터 바 */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 1.2rem;
}
.search-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.65rem;
  padding: 0.4rem 0.8rem;
  letter-spacing: 0.05em;
  outline: none;
  flex: 1;
  max-width: 280px;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--gold-dim); }
.search-input::placeholder { color: var(--text3); }

/* 우측 요약 패널 */
.summary-panel {
  width: 200px;
  min-width: 200px;
  border-left: 1px solid var(--border);
  background: var(--bg2);
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  overflow-y: auto;
  flex-shrink: 0;
}

.summary-section-title {
  font-size: 0.48rem;
  letter-spacing: 0.3em;
  color: var(--text3);
  margin-bottom: 0.5rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border);
}

.summary-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
}

.summary-empty {
  font-size: 0.55rem;
  color: var(--border2);
  letter-spacing: 0.1em;
}

/* ══════════════════════════════════════════
   헤더
══════════════════════════════════════════ */
.app-header {
  height: 48px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.2rem;
  flex-shrink: 0;
}

.header-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem;
  letter-spacing: 0.35em;
  color: var(--gold);
  font-weight: 300;
  cursor: pointer;
}
.header-brand:hover { color: var(--gold2); }

.header-nav {
  display: flex;
  gap: 0;
  height: 100%;
}
.header-nav-item {
  display: flex;
  align-items: center;
  padding: 0 1rem;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.header-nav-item:hover { color: var(--text2); }
.header-nav-item.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

/* ══════════════════════════════════════════
   하단 미니맵
══════════════════════════════════════════ */
.minimap {
  height: 52px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  padding: 0 1.2rem;
  gap: 1.5rem;
  overflow-x: auto;
  flex-shrink: 0;
}
.minimap::-webkit-scrollbar { height: 0; }

.minimap-group {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
}
.minimap-label {
  font-size: 0.48rem;
  letter-spacing: 0.2em;
  color: var(--text3);
  white-space: nowrap;
}
.minimap-tags {
  display: flex;
  gap: 0.3rem;
  flex-wrap: nowrap;
}
.minimap-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

/* ══════════════════════════════════════════
   나침반 (사전류) 전용
══════════════════════════════════════════ */
.dict-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 1.2rem;
  margin-bottom: 0.5rem;
  border-radius: 1px;
  cursor: default;
  transition: border-color 0.2s;
}
.dict-card:hover { border-color: var(--border2); }
.dict-card-title {
  font-size: 0.85rem;
  color: var(--text);
  margin-bottom: 0.3rem;
}
.dict-card-desc {
  font-size: 0.6rem;
  color: var(--text3);
  line-height: 1.7;
}
.dict-card-tags {
  margin-top: 0.6rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
}

/* ══════════════════════════════════════════
   모바일
══════════════════════════════════════════ */
@media (max-width: 640px) {
  body { overflow: auto; }
  #app-root { height: auto; overflow: auto; }
  
  .engine-layout { flex-direction: column; height: auto; overflow: visible; }

  .sidebar {
    width: 100%; min-width: unset;
    border-right: none;
    border-bottom: 1px solid var(--border);
    flex-direction: row;
    overflow-x: auto; overflow-y: hidden;
    height: auto;
    flex-wrap: nowrap;
  }
  .sidebar::-webkit-scrollbar { height: 0; }
  .sidebar-section-title { display: none; }
  .sidebar-item {
    padding: 0.7rem 0.85rem;
    border-left: none;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .sidebar-item.active {
    border-left-color: transparent;
    border-bottom-color: var(--gold);
  }
  .sidebar-item-count { display: none; }

  .summary-panel {
    width: 100%; min-width: unset;
    border-left: none;
    border-top: 1px solid var(--border);
    flex-direction: row;
    flex-wrap: wrap;
    gap: 0.8rem;
    height: auto;
    padding: 0.8rem;
  }

  .home-grid { grid-template-columns: 1fr; }
  .home-btn { padding: 1.5rem 1.2rem; }

  .header-nav { display: none; }

  .main-panel { padding: 1rem; }

  .option-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- 오프닝 -->
<div id="opening">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-text">NARRATIVE ENGINE</div>
    <div class="logo-sub">창조자의 설계도</div>
    <div class="logo-line"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app-root">
  <div id="root"></div>
</div>

<script>
window.addEventListener('DOMContentLoaded', function() {
  var opening = document.getElementById('opening');
  var appRoot = document.getElementById('app-root');
  setTimeout(function() { opening.classList.add('fade-out'); }, 3000);
  setTimeout(function() {
    opening.style.display = 'none';
    appRoot.classList.add('visible');
  }, 3900);
});
</script>

function useStore() {
  const [sel, setSel] = React.useState({});

  function toggle(sectionId, catId, itemId) {
    const dbCat = DB[sectionId]?.[catId];
    if (!dbCat) return;
    const key = `${sectionId}.${catId}`;

    setSel(prev => {
      const cur = prev[key] || [];
      if (dbCat.multi) {
        const idx = cur.indexOf(itemId);
        return { ...prev, [key]: idx >= 0 ? cur.filter(x => x !== itemId) : [...cur, itemId] };
      } else {
        return { ...prev, [key]: cur[0] === itemId ? [] : [itemId] };
      }
    });
  }

  function isSelected(sectionId, catId, itemId) {
    return (sel[`${sectionId}.${catId}`] || []).includes(itemId);
  }

  function getSelected(sectionId, catId) {
    return sel[`${sectionId}.${catId}`] || [];
  }

  function getSelectedItems(sectionId, catId) {
    const ids = getSelected(sectionId, catId);
    const items = DB[sectionId]?.[catId]?.items || [];
    return ids.map(id => items.find(i => i.id === id)).filter(Boolean);
  }

  function getSectionTags(sectionId) {
    const cats = SECTION_CATS[sectionId] || [];
    return cats.flatMap(catId => getSelectedItems(sectionId, catId));
  }

  function reset() { setSel({}); }

  return { toggle, isSelected, getSelected, getSelectedItems, getSectionTags, reset };
}

/* ════════════════════════════════════════════════
   COMPONENTS
════════════════════════════════════════════════ */

function Tag({ name }) {
  return <span className="tag">{name}</span>;
}

/* 선택형 옵션 패널 */
function OptionPanel({ sectionId, catId, store }) {
  const [query, setQuery] = React.useState("");
  const dbCat = DB[sectionId]?.[catId];
  if (!dbCat) return null;

  const items = dbCat.items.filter(i =>
    !query || i.name.includes(query) || (i.sub && i.sub.includes(query))
  );

  return (
    <div>
      <div className="panel-header">
        <div>
          <div className="panel-title">{dbCat.label}</div>
          <div className="panel-subtitle">{dbCat.sub}{dbCat.multi ? " · 복수 선택 가능" : " · 1개 선택"}</div>
        </div>
        <div style={{fontSize:"0.55rem",color:"var(--gold-dim)"}}>
          {store.getSelected(sectionId,catId).length > 0 && `${store.getSelected(sectionId,catId).length}개 선택됨`}
        </div>
      </div>
      <div className="filter-bar">
        <input
          className="search-input"
          placeholder="검색..."
          value={query}
          onChange={e => setQuery(e.target.value)}
        />
        {store.getSelected(sectionId,catId).length > 0 && (
          <button className="btn-ghost" onClick={() => {
            store.getSelected(sectionId,catId).forEach(id => store.toggle(sectionId, catId, id));
          }}>해제</button>
        )}
      </div>
      <div className="option-grid">
        {items.map(item => {
          const sel = store.isSelected(sectionId, catId, item.id);
          return (
            <div key={item.id}
              className={`option-card${sel ? " selected" : ""}`}
              onClick={() => store.toggle(sectionId, catId, item.id)}
            >
              <div className="option-card-check">✓ 장착</div>
              <div className="option-card-name">{item.name}</div>
              <div className="option-card-sub">{item.sub}</div>
            </div>
          );
        })}
        {items.length === 0 && (
          <div style={{color:"var(--text3)",fontSize:"0.65rem",padding:"1rem 0"}}>검색 결과 없음</div>
        )}
      </div>
    </div>
  );
}

/* 사전형 패널 (나침반 전용) */
function DictPanel({ sectionId, catId }) {
  const dbCat = DB[sectionId]?.[catId];
  if (!dbCat) return null;
  return (
    <div>
      <div className="panel-header">
        <div>
          <div className="panel-title">{dbCat.label}</div>
          <div className="panel-subtitle">{dbCat.sub}</div>
        </div>
      </div>
      {dbCat.items.map(item => (
        <div key={item.id} className="dict-card">
          <div className="dict-card-title">{item.name}</div>
          <div className="dict-card-desc">{item.desc}</div>
          {item.sub && (
            <div className="dict-card-tags">
              <Tag name={item.sub} />
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* 요약 패널 */
function SummaryPanel({ store }) {
  return (
    <div className="summary-panel">
      <div style={{fontSize:"0.5rem",letterSpacing:"0.35em",color:"var(--text3)",borderBottom:"1px solid var(--border)",paddingBottom:"0.5rem",marginBottom:"0.5rem"}}>
        LIVE SUMMARY
      </div>
      {SECTIONS.map(s => {
        if (s.id === "compass") return null;
        const tags = store.getSectionTags(s.id);
        return (
          <div key={s.id}>
            <div className="summary-section-title">{s.label}</div>
            <div className="summary-tags">
              {tags.length > 0
                ? tags.map(t => <Tag key={t.id} name={t.name} />)
                : <span className="summary-empty">—</span>
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* 미니맵 */
function Minimap({ store }) {
  return (
    <div className="minimap">
      {SECTIONS.filter(s => s.id !== "compass").map((s, i) => {
        const tags = store.getSectionTags(s.id);
        return (
          <React.Fragment key={s.id}>
            {i > 0 && <div className="minimap-divider" />}
            <div className="minimap-group">
              <span className="minimap-label">{s.label}</span>
              <div className="minimap-tags">
                {tags.length > 0
                  ? tags.slice(0,4).map(t => <Tag key={t.id} name={t.name} />)
                  : <span style={{fontSize:"0.5rem",color:"var(--border2)"}}>—</span>
                }
                {tags.length > 4 && <span style={{fontSize:"0.5rem",color:"var(--text3)"}}>+{tags.length-4}</span>}
              </div>
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* 홈 화면 */
function HomeScreen({ onEnter }) {
  return (
    <div className="home-screen">
      <div className="home-eyebrow">— 창조자의 설계도 —</div>
      <div className="home-grid">
        {SECTIONS.map(s => (
          <button key={s.id} className="home-btn" onClick={() => onEnter(s.id)}>
            <div className="home-btn-num">{s.num}</div>
            <div className="home-btn-title">{s.label}</div>
            <div className="home-btn-sub">{s.sub}</div>
            <div className="home-btn-arrow">→</div>
          </button>
        ))}
      </div>
    </div>
  );
}

/* 섹션 내부 화면 */
function SectionScreen({ sectionId, store }) {
  const cats = SECTION_CATS[sectionId] || [];
  const [activeCat, setActiveCat] = React.useState(cats[0]);
  const dbSection = DB[sectionId] || {};

  return (
    <div className="engine-layout">
      {/* 좌측 사이드바 */}
      <div className="sidebar">
        <div className="sidebar-section-title">카테고리</div>
        {cats.map(catId => {
          const cat = dbSection[catId];
          if (!cat) return null;
          const selCount = store.getSelected(sectionId, catId).length;
          return (
            <div key={catId}
              className={`sidebar-item${activeCat === catId ? " active" : ""}`}
              onClick={() => setActiveCat(catId)}
            >
              <span>{cat.label}</span>
              {selCount > 0 && <span className="sidebar-item-count">{selCount}</span>}
            </div>
          );
        })}
      </div>

      {/* 중앙 */}
      <div className="main-panel">
        {COMPASS_CATS.has(activeCat)
          ? <DictPanel sectionId={sectionId} catId={activeCat} />
          : <OptionPanel sectionId={sectionId} catId={activeCat} store={store} />
        }
      </div>

      {/* 우측 요약 */}
      <SummaryPanel store={store} />
    </div>
  );
}

/* ════════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = React.useState("home"); // "home" | sectionId
  const [activeSection, setActiveSection] = React.useState(null);
  const store = useStore();

  function goHome() { setScreen("home"); setActiveSection(null); }
  function enterSection(id) { setScreen("section"); setActiveSection(id); }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>

      {/* 헤더 */}
      <div className="app-header">
        <div className="header-brand" onClick={goHome}>NARRATIVE ENGINE</div>

        {screen === "section" && (
          <div className="header-nav">
            {SECTIONS.map(s => (
              <div key={s.id}
                className={`header-nav-item${activeSection === s.id ? " active" : ""}`}
                onClick={() => enterSection(s.id)}
              >
                {s.label}
              </div>
            ))}
          </div>
        )}

        <div className="header-right">
          {screen === "section" && (
            <>
              <button className="btn-ghost" onClick={store.reset}>초기화</button>
              <button className="btn-ghost" onClick={goHome}>홈</button>
            </>
          )}
        </div>
      </div>

      {/* 본문 */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {screen === "home"
          ? <HomeScreen onEnter={enterSection} />
          : <SectionScreen sectionId={activeSection} store={store} />
        }
      </div>

      {/* 하단 미니맵 */}
      <Minimap store={store} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
