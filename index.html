<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Narrative Builder — 창조주의 설계도</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <style>html,body{background:#080a0f;}</style>
</head>
<body>

<!-- ══════════════════════════════════════
     OPENING SCREEN
══════════════════════════════════════ -->
<div id="screen-opening" class="screen active">
  <div class="opening-content" id="opening-content">
    <div class="opening-title">Narrative Builder</div>
    <div class="opening-divider-wrap">
      <div class="opening-divider" id="opening-divider"></div>
    </div>
    <div class="opening-subtitle">창조주의 설계도</div>
  </div>
</div>

<!-- ══════════════════════════════════════
     HOME SCREEN
══════════════════════════════════════ -->
<div id="screen-home" class="screen">
  <div class="home-container">
    <button class="home-link pressable" id="btn-narrative" onclick="goToNarrative()">서사 구조</button>
    <button class="home-link pressable" id="btn-create" onclick="goToCreate()">창작 시작</button>
  </div>
</div>


<!-- ══════════════════════════════════════
     NARRATIVE STRUCTURE PAGE
══════════════════════════════════════ -->
<div id="screen-narrative" class="screen">
  <div class="narrative-header">
    <div style="font-size:0.65rem;color:var(--text-muted);letter-spacing:0.2em;margin-bottom:4px;">NARRATIVE BUILDER</div>
    <h2>서사 구조</h2>
    <div class="narrative-divider"></div>
    <div style="font-size:0.72rem;color:var(--text-secondary);">구조를 이해하면 이야기가 보인다</div>
  </div>

  <div class="narrative-main-row">
    <button class="narrative-main-btn" onclick="showAppNotice('신화의 여정 17단계 — 준비 중')">
      <div class="narrative-main-btn-icon">📜</div>
      <div class="narrative-main-btn-title">신화의 여정<br>17단계</div>
      <div class="narrative-main-btn-sub">조셉 캠벨</div>
    </button>
    <button class="narrative-main-btn" onclick="showAppNotice('영웅의 여정 12단계 — 준비 중')">
      <div class="narrative-main-btn-icon">⚔️</div>
      <div class="narrative-main-btn-title">영웅의 여정<br>12단계</div>
      <div class="narrative-main-btn-sub">크리스토퍼 보글러</div>
    </button>
  </div>

  <button class="narrative-sub-btn" onclick="showAppNotice('창조자의 설계도 18단계 — 준비 중')">
    <span class="narrative-sub-btn-icon">✦</span>
    <span class="narrative-sub-btn-text">창조자의 설계도 18단계 (HAN)</span>
  </button>

  <button class="narrative-back-btn" onclick="goHome()">
    ← 홈으로
  </button>
</div>


<!-- ══════════════════════════════════════
     MAIN CREATIVE PAGE
══════════════════════════════════════ -->
<div id="screen-create" class="screen">

  <!-- ① 설명창 (info-panel) — 카드 / 카테고리 슬라이드 -->
  <div class="info-panel" id="info-panel">
    <div class="info-empty" id="info-empty">아래에서 카테고리를 선택하세요</div>
    <div class="info-slider-wrap hidden" id="info-slider-wrap">
      <div class="info-swipe-hint" id="info-swipe-hint">← 카테고리 설명 보기</div>
      <div class="info-slider-viewport" id="info-slider-viewport">
        <div class="info-slider-track" id="info-slider-track">
          <div class="info-slide info-slide-card">
            <div class="info-main">
              <div class="info-icon" id="info-card-icon"></div>
              <div class="info-text-wrap">
                <div class="info-name" id="info-card-name"></div>
                <div class="info-desc" id="info-card-desc"></div>
              </div>
            </div>
            <div class="info-actions">
              <button type="button" class="info-btn-detail pressable" onclick="openDetailSheet('card')">상세 정보</button>
              <button type="button" class="info-btn-select pressable" id="info-select-btn" onclick="selectCurrentCard()">선택</button>
            </div>
          </div>
          <div class="info-slide info-slide-category">
            <div class="info-main">
              <div class="info-icon" id="info-cat-icon"></div>
              <div class="info-text-wrap">
                <div class="info-name" id="info-cat-name"></div>
                <div class="info-desc" id="info-cat-desc"></div>
              </div>
            </div>
            <div class="info-actions">
              <button type="button" class="info-btn-detail pressable" onclick="openDetailSheet('category')">상세 정보</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 중앙 영역 -->
  <div class="center-area" id="center-area">
    <div class="center-page active" id="page-default">
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <div class="empty-text">아래 메뉴에서<br>카테고리를 선택하세요</div>
      </div>
    </div>
  </div>

  <div class="create-chrome-bottom" id="create-chrome-bottom">
    
  <!-- ③ 컨트롤 바 -->
<div class="control-bar">
  <button type="button" class="ctrl-btn ctrl-btn-back pressable" onclick="goHome()">
    <span class="ctrl-icon">◀</span>
    <span class="ctrl-label">뒤로가기</span>
  </button>
  <button type="button" class="ctrl-btn-idea pressable" onclick="openStatusOverlay()">
    아이디어 통합
  </button>
  <button type="button" class="ctrl-btn ctrl-btn-menu pressable" id="btn-extra-menu" onclick="toggleExtraMenu()">
    <span class="ctrl-menu-icon" id="extra-menu-icon">☰</span>
  </button>
</div>

<!-- 확장 메뉴 패널 (기본 숨김) -->
<div class="extra-menu-panel" id="extra-menu-panel">
  <button type="button" class="extra-btn extra-btn-danger pressable" onclick="fullReset()">전체 초기화</button>
  <button type="button" class="extra-btn pressable" id="btn-partial-reset" onclick="partialReset()">캐릭터 초기화</button>
  <button type="button" class="extra-btn extra-btn-random-all pressable" onclick="randomSelectAll()">전체 랜덤 선택</button>
  <button type="button" class="extra-btn extra-btn-random pressable" onclick="randomSelectCurrent()">랜덤 선택</button>
</div>

  <!-- ② 서브 메뉴 패널 (하단 네비 위) -->
  <div class="subnav-panel">
    <div class="subnav-scroll" id="subnav-scroll"></div>
  </div>

  <!-- 하단 네비게이션 -->
  <div class="bottom-nav">
    <button type="button" class="nav-btn nav-tab pressable active" id="nav-character" onclick="switchNav('character')">
      <div class="nav-icon">
        <svg class="nav-svg" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="11" cy="6.5" r="3.2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 19 C5 14.5 7.5 12.5 11 12.5 C14.5 12.5 17 14.5 17 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="nav-label">캐릭터</div>
    </button>
    <button type="button" class="nav-btn nav-tab pressable" id="nav-narrative2" onclick="switchNav('narrative2')">
      <div class="nav-icon">
        <svg class="nav-svg" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 5.5 Q11 3.5 18 5.5 V17.5 Q11 19.5 4 17.5 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <line x1="11" y1="4" x2="11" y2="18.5" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="nav-label">서사</div>
    </button>

    <button type="button" class="nav-btn nav-tab pressable" id="nav-world" onclick="switchNav('world')">
      <div class="nav-icon">
        <svg class="nav-svg" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/>
          <ellipse cx="11" cy="11" rx="3.5" ry="8" stroke="currentColor" stroke-width="1"/>
          <line x1="3" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="1" opacity="0.65"/>
          <path d="M5 8 Q11 9 17 8" stroke="currentColor" stroke-width="1" opacity="0.5"/>
          <path d="M5 14 Q11 13 17 14" stroke="currentColor" stroke-width="1" opacity="0.5"/>
        </svg>
      </div>
      <div class="nav-label">세계관</div>
    </button>
    <button type="button" class="nav-btn nav-tab pressable" id="nav-compass" onclick="switchNav('compass')">
      <div class="nav-icon">
        <svg class="nav-svg" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 4.5 L13 11 L11 12 L9 11 Z" fill="currentColor" opacity="0.95"/>
          <path d="M11 17.5 L13 11 L11 12 L9 11 Z" fill="currentColor" opacity="0.35"/>
          <circle cx="11" cy="11" r="1.8" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="nav-label">나침반</div>
    </button>
  </div>
  </div>

  <!-- 상태 오버레이 -->
  <div class="status-overlay" id="status-overlay" onclick="closeStatusOverlay(event)">
    <div class="status-panel">
      <div class="status-header">
        <h2 class="status-title">현재 선택 상태</h2>
        <div class="status-header-actions">
          <button type="button" class="status-share-btn pressable" onclick="shareStatus()">공유</button>
          <button type="button" class="status-close pressable" onclick="closeStatusOverlay()">✕</button>
        </div>
      </div>
      <div class="status-body" id="status-body"></div>
    </div>
  </div>

  <!-- 상세 정보 시트 -->
  <div class="detail-overlay" id="detail-overlay" onclick="closeDetailSheet(event)">
    <div class="detail-sheet">
      <button type="button" class="detail-close pressable" onclick="closeDetailSheet()">✕</button>
      <div class="detail-placeholder">다음 업데이트 예정</div>
    </div>
  </div>

</div>

<!-- 앱 스타일 다이얼로그 -->
<div class="app-dialog-overlay" id="app-dialog-overlay">
  <div class="app-dialog">
    <p class="app-dialog-msg" id="app-dialog-msg"></p>
    <div class="app-dialog-actions" id="app-dialog-actions"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
